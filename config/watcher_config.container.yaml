watch_paths:

  - path: "/watch/Nextcloud/AI-ML"
    recursive: true

  - path: "/watch/Nextcloud/My Computer Setup"
    recursive: true

  - path: "/watch/Nextcloud/OpenAI Projects Context"
    recursive: true

  - path: "/watch/Nextcloud/Resumes"
    recursive: true

  - path: "/watch/Nextcloud/Scripts"
    recursive: true

  - path: "/watch/Nextcloud/Software Engineering"
    recursive: true

  - path: "/watch/Nextcloud/Splunk"
    recursive: true

  - path: "/watch/Code"
    recursive: true


allowed_extensions:

  - .md
  - .txt
  - .py
  - .js
  - .ts
  - .tsx
  - .go
  - .rs
  - .java
  - .c
  - .cpp
  - .h
  - .hpp


ignore_patterns:

  # Version control
  - ".git"
  - ".svn"
  - ".hg"

  # Python
  - "__pycache__"
  - ".venv"
  - "venv"
  - ".pytest_cache"
  - ".mypy_cache"
  - ".tox"

  # Node
  - "node_modules"
  - ".npm"
  - ".yarn"

  # Build outputs
  - "build"
  - "dist"
  - "target"
  - "out"
  - ".next"

  # IDE
  - ".idea"
  - ".vscode"

  # Secrets and credentials
  - ".env"
  - ".env.*"
  - ".aws"
  - ".azure"
  - ".config/gcloud"
  - ".gnupg"
  - ".ssh"
  - "*.key"
  - "*.pem"
  - "*.p12"
  - "*.pfx"
  - "*secret*"
  - "*secrets*"
  - "*credential*"
  - "*credentials*"
  - "*token*"
  - "*tokens*"
  - "id_rsa"
  - "id_dsa"
  - "id_ecdsa"
  - "id_ed25519"
  - "*.cfg"
  - "*.ini"
  - "*.json"
  - "*.sql"
  - "*.sh"
  - "*.toml"
  - "*.yaml"
  - "*.yml"

  # OS junk
  - ".DS_Store"
  - "Thumbs.db"

  # ML artifacts
  - ".cache"
  - "wandb"
  - "mlruns"
  - "checkpoints"

  # Binary artifacts
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".gif"
  - ".pdf"
  - ".zip"
  - ".tar"
  - ".gz"
  - ".mp4"

  # Translation and localization files
  - "translations"
  - "i18n"
  - "locales"
  - "vendor"
