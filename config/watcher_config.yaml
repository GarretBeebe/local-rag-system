watch_paths:

  # - path: "~/Code"
  #   recursive: true

  - path: "~/Nextcloud/AI-ML"
    recursive: true

  - path: "~/Nextcloud/My Computer Setup"
    recursive: true

  - path: "~/Nextcloud/Resumes"
    recursive: true

  - path: "~/Nextcloud/Scripts"
    recursive: true

  - path: "~/Nextcloud/Software Engineering"
    recursive: true

  - path: "~/Nextcloud/Splunk"
    recursive: true
  
  - path: "~/Code"
    recursive: true


allowed_extensions:

  - .md
  - .txt
  - .py
  - .yaml
  - .yml
  - .json
  - .toml
  - .cfg
  - .ini
  - .sql
  - .js
  - .ts
  - .tsx
  - .go
  - .rs
  - .java
  - .c
  - .cpp
  - .h
  - .hpp
  - .sh


ignore_patterns:

  # Version control
  - ".git"
  - ".svn"
  - ".hg"

  # Python
  - "__pycache__"
  - ".venv"
  - "venv"
  - ".pytest_cache"
  - ".mypy_cache"
  - ".tox"

  # Node
  - "node_modules"
  - ".npm"
  - ".yarn"

  # Build outputs
  - "build"
  - "dist"
  - "target"
  - "out"
  - ".next"

  # IDE
  - ".idea"
  - ".vscode"

  # OS junk
  - ".DS_Store"
  - "Thumbs.db"

  # ML artifacts
  - ".cache"
  - "wandb"
  - "mlruns"
  - "checkpoints"

  # Binary artifacts
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".gif"
  - ".pdf"
  - ".zip"
  - ".tar"
  - ".gz"
  - ".mp4"

# Translation and localization files
  - "translations"
  - "i18n"
  - "locales"
  - ".git"
  - "node_modules"
  - "__pycache__"
  - ".venv"
  - "dist"
  - "build"
  - "vendor"