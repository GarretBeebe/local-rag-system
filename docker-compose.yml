version: "3.9"

# ---------------------------------------------------------------------------
# Full RAG stack for Docker for Windows.
#
# First-time model setup
# ----------------------
# After starting the stack, pull the required models into the Ollama container:
#
#   docker exec rag-ollama ollama pull nomic-embed-text
#   docker exec rag-ollama ollama pull llama3.1:8b
#   docker exec rag-ollama ollama pull qwen2.5:14b
#   docker exec rag-ollama ollama pull qwen2.5-coder:14b
#
# Models are stored in the ollama-models named volume and persist across restarts.
#
# Watcher volume mounts
# ---------------------
# The watcher service needs access to your local document directories.
# Edit the volumes section under 'watcher' to map your Windows paths to the
# container paths listed in config/watcher_config.yaml.
#
# Example — if watcher_config.yaml has:
#   - path: /mnt/nextcloud
#   - path: /mnt/code
#
# Add these volumes:
#   - C:/Users/YourName/Nextcloud:/mnt/nextcloud
#   - C:/Users/YourName/Code:/mnt/code
# ---------------------------------------------------------------------------

services:

  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__TELEMETRY_DISABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rag-api
    restart: unless-stopped
    command: uvicorn web.api_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

  watcher:
    build: .
    container_name: rag-watcher
    restart: unless-stopped
    command: python -m indexer.watcher
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
      # Mount your document directories here. See note at top of file.
      # - C:/Users/YourName/Nextcloud:/mnt/nextcloud
      # - C:/Users/YourName/Code:/mnt/code

volumes:
  ollama-models:
  qdrant-storage:
  rag-data:
  hf-cache:
