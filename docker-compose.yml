version: "3.9"

# ---------------------------------------------------------------------------
# Local RAG stack — runs on Windows, macOS, and Linux via Docker.
#
# Ollama runs on the host (not in Docker). Install it from https://ollama.com
# and make sure it is running before starting this stack.
#
# Watcher volume mounts
# ---------------------
# The watcher service needs access to your local document directories.
# Copy .env.example to .env and set your host paths, then uncomment the
# volumes below to map them to the container paths in watcher_config.yaml.
#
# Example — if watcher_config.yaml has:
#   - path: /mnt/nextcloud
#   - path: /mnt/code
#
# Uncomment and the paths will be read from your .env file:
#   - ${NEXTCLOUD_PATH}:/mnt/nextcloud
#   - ${CODE_PATH}:/mnt/code
# ---------------------------------------------------------------------------

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__TELEMETRY_DISABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rag-api
    restart: unless-stopped
    command: uvicorn web.api_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

  watcher:
    build: .
    container_name: rag-watcher
    restart: unless-stopped
    command: python -m indexer.watcher
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
      # Mount your document directories here. See note at top of file.
      # - ${NEXTCLOUD_PATH}:/mnt/nextcloud
      # - ${CODE_PATH}:/mnt/code

volumes:
  qdrant-storage:
  rag-data:
  hf-cache:
