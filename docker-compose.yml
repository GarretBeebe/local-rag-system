# ---------------------------------------------------------------------------
# Local RAG stack — runs on Windows, macOS, and Linux via Docker.
#
# Ollama runs on the host (not in Docker). Install it from https://ollama.com
# and make sure it is running before starting this stack.
#
# Watcher volume mounts
# ---------------------
# The watcher service needs access to your local document directories.
# Copy .env.example to .env and set your host paths, then uncomment the
# volumes below to map them to the container paths in watcher_config.container.yaml.
#
# The watcher container config (config/watcher_config.container.yaml) uses:
#   - path: /watch/Nextcloud
#   - path: /watch/Code
#
# Set NEXTCLOUD_PATH and CODE_PATH in .env.
# When running from WSL2, use WSL2 paths (even on Windows):
#   NEXTCLOUD_PATH=/mnt/c/Users/YourName/Nextcloud
#   CODE_PATH=/mnt/c/Users/YourName/Code
# ---------------------------------------------------------------------------

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
      QDRANT__TELEMETRY_DISABLED: "true"

  api:
    build: .
    container_name: rag-api
    restart: unless-stopped
    command: uvicorn web.api_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      HF_TOKEN: ${HF_TOKEN:-}
      RAG_MODE: ${RAG_MODE:-strict}
      RAG_TIMING: ${RAG_TIMING:-0}
      MMR_ENABLED: ${MMR_ENABLED:-true}
      API_KEY: ${API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ALLOW_INSECURE_LOCALONLY: ${ALLOW_INSECURE_LOCALONLY:-false}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      MAX_CHAT_MESSAGES: ${MAX_CHAT_MESSAGES:-200}
      MAX_CHAT_CONTENT_ITEMS: ${MAX_CHAT_CONTENT_ITEMS:-32}
      MAX_CHAT_MESSAGE_CHARS: ${MAX_CHAT_MESSAGE_CHARS:-8000}
      MAX_CHAT_TOTAL_CHARS: ${MAX_CHAT_TOTAL_CHARS:-120000}
      MAX_CHAT_QUESTION_CHARS: ${MAX_CHAT_QUESTION_CHARS:-12000}
      MAX_MODEL_NAME_CHARS: ${MAX_MODEL_NAME_CHARS:-128}
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

  watcher:
    build: .
    container_name: rag-watcher
    restart: unless-stopped
    command: python -m indexer.watcher
    depends_on:
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CONFIG_PATH: /app/config/watcher_config.container.yaml
      HF_TOKEN: ${HF_TOKEN:-}
      RAG_MODE: ${RAG_MODE:-strict}
    volumes:
      - rag-data:/app/data
      - hf-cache:/root/.cache/huggingface
      # Mount your document directories here. See note at top of file.
      - ${NEXTCLOUD_PATH}:/watch/Nextcloud:ro
      - ${CODE_PATH}:/watch/Code:ro

volumes:
  qdrant-storage:
  rag-data:
  hf-cache:
