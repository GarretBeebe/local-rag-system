<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local RAG</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"
          integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.2/dist/purify.min.js"
          integrity="sha384-AX0sZ/phUL4R6LAFP+mob0mJIWg2c3PX8wPn48ctytOl7XKfRQHbakBt5/QID7uh"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #ddd;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ── */

    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 1rem;
    }

    .login-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .login-card h1 { font-size: 1.2rem; color: #fff; margin-bottom: 1.5rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.35rem; }
    .field input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #111;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #ddd;
      font-size: 1rem;
    }
    .field input:focus { outline: none; border-color: #5a8fd6; }

    #login-error { color: #e07070; font-size: 0.82rem; min-height: 1.2rem; margin-bottom: 0.75rem; }

    /* ── Chat ── */

    #chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    header h1 { font-size: 0.95rem; color: #fff; font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 0.6rem; }

    select {
      background: #111;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #ddd;
      padding: 0.3rem 0.5rem;
      font-size: 0.82rem;
      max-width: 180px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg { max-width: min(80%, 720px); word-break: break-word; }

    .msg.user {
      align-self: flex-end;
      background: #1e3a5f;
      padding: 0.6rem 0.85rem;
      border-radius: 14px 14px 3px 14px;
      color: #dce8f8;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      padding: 0.65rem 0.9rem;
      border-radius: 3px 14px 14px 14px;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .msg.error {
      align-self: flex-start;
      background: #2a1010;
      border: 1px solid #6a2020;
      padding: 0.6rem 0.85rem;
      border-radius: 6px;
      color: #e08080;
      font-size: 0.85rem;
    }

    /* Markdown inside assistant bubbles */
    .msg.assistant p { margin-bottom: 0.5rem; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 1.3rem; margin-bottom: 0.5rem; }
    .msg.assistant li { margin-bottom: 0.2rem; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
      margin: 0.75rem 0 0.4rem;
      color: #fff;
    }
    .msg.assistant code {
      background: #111;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: "Fira Code", "Cascadia Code", monospace;
    }
    .msg.assistant pre {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 0.75rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .msg.assistant pre code { background: none; padding: 0; font-size: 0.88rem; }
    .msg.assistant blockquote {
      border-left: 3px solid #444;
      padding-left: 0.75rem;
      color: #aaa;
      margin: 0.4rem 0;
    }
    .msg.assistant a { color: #7ab0e8; }
    .msg.assistant hr { border: none; border-top: 1px solid #2a2a2a; margin: 0.5rem 0; }

    .thinking { color: #666; font-style: italic; font-size: 0.85rem; align-self: flex-start; padding: 0.4rem 0; }

    /* ── Input bar ── */

    .input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      background: #1e1e1e;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 0.6rem 0.75rem;
      background: #111;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      line-height: 1.45;
      overflow-y: auto;
    }
    textarea:focus { outline: none; border-color: #5a8fd6; }

    button.primary {
      background: #2d5fa8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1rem;
      height: 42px;
      font-size: 0.95rem;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }
    button.primary:hover { background: #3a72c0; }
    button.primary:disabled { background: #252525; color: #555; cursor: not-allowed; }

    button.secondary {
      background: transparent;
      color: #777;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary:hover { color: #ccc; background: #222; }
  </style>
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <h1>Local RAG</h1>
      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <div id="login-error"></div>
        <button type="submit" id="login-btn" class="primary" style="width:100%;height:40px">
          Sign in
        </button>
      </form>
    </div>
  </div>

  <div id="chat-view">
    <header>
      <h1>Local RAG</h1>
      <div class="header-right">
        <select id="model-select" title="Model"></select>
        <select id="mode-select" title="RAG mode">
          <option value="augmented">Augmented</option>
          <option value="strict">Strict</option>
        </select>
        <button id="logout-btn" class="secondary">Sign out</button>
      </div>
    </header>
    <div id="messages"></div>
    <div class="input-bar">
      <textarea id="input" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="send-btn" class="primary">Send</button>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    const loginView   = $('login-view');
    const chatView    = $('chat-view');
    const loginForm   = $('login-form');
    const loginError  = $('login-error');
    const loginBtn    = $('login-btn');
    const messagesEl  = $('messages');
    const inputEl     = $('input');
    const sendBtn     = $('send-btn');
    const modelSelect = $('model-select');
    const modeSelect  = $('mode-select');
    const logoutBtn   = $('logout-btn');

    let TOKEN = localStorage.getItem('rag_token') || '';

    // ── Auth ─────────────────────────────────────────────────────────────────

    function showLogin(msg = '') {
      TOKEN = '';
      localStorage.removeItem('rag_token');
      loginError.textContent = msg;
      loginView.style.display = 'flex';
      chatView.style.display = 'none';
    }

    async function showChat() {
      loginView.style.display = 'none';
      chatView.style.display = 'flex';
      await loadModels();
      inputEl.focus();
    }

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      loginBtn.disabled = true;
      loginError.textContent = '';
      const username = $('username').value.trim();
      const password = $('password').value;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          loginError.textContent = res.status === 401
            ? 'Invalid username or password.'
            : `Login failed (${res.status}).`;
          return;
        }
        const { token } = await res.json();
        TOKEN = token;
        localStorage.setItem('rag_token', TOKEN);
        await showChat();
      } catch {
        loginError.textContent = 'Could not reach the server.';
      } finally {
        loginBtn.disabled = false;
      }
    });

    logoutBtn.addEventListener('click', () => showLogin());

    // ── Models ────────────────────────────────────────────────────────────────

    async function loadModels() {
      try {
        const res = await apiFetch('/v1/models');
        if (!res || !res.ok) return;
        const { data } = await res.json();
        modelSelect.innerHTML = '';
        for (const m of data) {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.id;
          modelSelect.appendChild(opt);
        }
      } catch { /* non-fatal — model list stays empty */ }
    }

    // ── Authenticated fetch ───────────────────────────────────────────────────

    function apiFetch(url, opts = {}) {
      return fetch(url, {
        ...opts,
        headers: { 'Authorization': `Bearer ${TOKEN}`, ...opts.headers },
      });
    }

    // ── Message rendering ─────────────────────────────────────────────────────

    function appendMessage(role, html) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant') {
        div.innerHTML = DOMPurify.sanitize(html);
      } else {
        div.textContent = html; // plain text for user and error roles
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // ── Send ──────────────────────────────────────────────────────────────────

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);

      const thinking = document.createElement('div');
      thinking.className = 'thinking';
      thinking.textContent = 'Thinking…';
      messagesEl.appendChild(thinking);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      let accumulated = '';
      let assistantDiv = null;

      try {
        const res = await apiFetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: [{ role: 'user', content: text }],
            stream: true,
            rag_mode: modeSelect.value,
          }),
        });

        if (res.status === 401) {
          thinking.remove();
          showLogin('Session expired. Please sign in again.');
          return;
        }

        if (!res.ok) {
          thinking.remove();
          const body = await res.text().catch(() => '');
          appendMessage('error', `Server error ${res.status}${body ? ': ' + body : ''}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop(); // keep incomplete last line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            let chunk;
            try { chunk = JSON.parse(payload); } catch { continue; }
            const delta = chunk?.choices?.[0]?.delta?.content;
            if (!delta) continue;

            accumulated += delta;
            if (!assistantDiv) {
              thinking.remove();
              assistantDiv = appendMessage('assistant', marked.parse(accumulated));
            } else {
              assistantDiv.innerHTML = DOMPurify.sanitize(marked.parse(accumulated));
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }

        if (!assistantDiv) {
          thinking.remove();
          appendMessage('error', 'No response received.');
        }
      } catch (err) {
        thinking.remove();
        appendMessage('error', `Request failed: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    // ── Init ──────────────────────────────────────────────────────────────────

    (async () => {
      if (!TOKEN) { showLogin(); return; }
      try {
        const res = await apiFetch('/v1/models');
        if (!res || res.status === 401) { showLogin(); return; }
        await showChat();
      } catch {
        showLogin();
      }
    })();
  </script>
</body>
</html>
